version: "3.8"

services:
  property-scanner:
    build: .
    container_name: property-scanner
    ports:
      - "8787:8787"        # Web interface → http://<NAS-IP>:8787
    volumes:
      - ./data:/data        # Persistent storage for JSON, HTML, logs
    environment:
      - PROPERTY_DATA_DIR=/data
      - PORT=8787
      - PERSIST_ASSESSMENTS=true   # Save ad-hoc assessments to dashboard
      - TZ=Australia/Brisbane      # Cron fires at your local time
    restart: unless-stopped
